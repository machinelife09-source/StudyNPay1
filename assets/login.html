<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StudyNPay – Admin Login</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>

<style>
:root{
  --accent:#ff914d;
  --accent-hover:#ff7a2f;
  --card-bg:rgba(255,255,255,.055);
  --card-border:rgba(255,255,255,.10);
  --text-primary:#ffffff;
  --text-secondary:#b8c7f0;
  --text-muted:#7a8dbf;
  --input-bg:rgba(255,255,255,.07);
  --input-border:rgba(255,255,255,.13);
  --error:#ff4f6b;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'DM Sans',sans-serif;
  background:#060f28;
  background-image:
    radial-gradient(ellipse 80% 60% at 20% 0%,#1a3a8f 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 100%,#0f2060 0%,transparent 55%),
    linear-gradient(180deg,#07122b 0%,#0b1c4a 40%,#0e2258 70%,#091535 100%);
  background-attachment:fixed;
  color:#fff;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

h1,h2{font-family:'Plus Jakarta Sans',sans-serif}

.glass{
  background:var(--card-bg);
  border:1px solid var(--card-border);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border-radius:16px;
}

.inp{
  width:100%;
  background:var(--input-bg);
  border:1px solid var(--input-border);
  border-radius:10px;
  color:#fff;
  font-size:.9rem;
  padding:.7rem 1rem;
  outline:none;
}

.inp:focus{
  border-color:rgba(255,145,77,.6);
  box-shadow:0 0 0 3px rgba(255,145,77,.2);
}

.inp::placeholder{color:var(--text-muted)}

.btn{
  background:linear-gradient(135deg,#ff914d,#e86d2e);
  color:#fff;
  font-weight:700;
  font-size:.95rem;
  border:none;
  border-radius:10px;
  padding:.8rem;
  cursor:pointer;
  width:100%;
}

.btn:disabled{opacity:.6;cursor:not-allowed}

.err{
  color:var(--error);
  font-size:.82rem;
  margin-top:.5rem;
  display:none;
}
</style>
</head>

<body>

<div class="glass" style="width:min(400px,92vw);padding:2.5rem 2rem">

  <div style="text-align:center;margin-bottom:2rem">
    <div style="width:48px;height:48px;background:linear-gradient(135deg,#ff914d,#e86d2e);border-radius:12px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:1rem">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
        <path d="M12 3L1 9l11 6 9-4.91V17h2V9M5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/>
      </svg>
    </div>
    <h2 style="font-size:1.5rem;font-weight:800">StudyNPay</h2>
    <p style="color:var(--text-muted);font-size:.85rem;margin-top:.3rem">
      Admin Login
    </p>
  </div>

  <div style="margin-bottom:1.1rem">
    <label style="font-size:.8rem;font-weight:600;color:var(--text-secondary)">Username</label>
    <input class="inp" id="username" type="text" placeholder="Enter username"/>
  </div>

  <div style="margin-bottom:1.5rem">
    <label style="font-size:.8rem;font-weight:600;color:var(--text-secondary)">Password</label>
    <input class="inp" id="password" type="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()"/>
  </div>

  <div class="err" id="err-msg"></div>

  <button class="btn" id="login-btn" onclick="doLogin()">Login</button>

</div>

<script>

// ✅ Auto redirect if already logged in
fetch('api/check_auth.php')
  .then(res => res.json())
  .then(data => {
    if(data.auth){
      window.location.href = 'user.php';
    }
  });

async function doLogin(){
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('err-msg');

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  if(!username || !password){
    err.textContent = "Please enter username and password";
    err.style.display = "block";
    return;
  }

  btn.disabled = true;
  btn.textContent = "Logging in...";
  err.style.display = "none";

  try{
    const res = await fetch('api/login.php',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username,password})
    });

    const data = await res.json();

    if(data.success){
      window.location.href = 'user.php'; // ✅ dashboard
    } else {
      err.textContent = data.message || "Invalid credentials";
      err.style.display = "block";
    }

  }catch(e){
    err.textContent = "Connection error. Please try again.";
    err.style.display = "block";
  }

  btn.disabled = false;
  btn.textContent = "Login";
}
</script>

</body>
</html>
